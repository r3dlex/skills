name: AI SDLC Pre-commit Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek-check:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run prek
        uses: j178/prek-action@v2
        with:
          extra-args: '--all-files'
