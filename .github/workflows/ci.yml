name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make test scripts executable
        run: |
          chmod +x tests/run-tests.sh
          chmod +x tests/test-skills.sh
          chmod +x tests/test-scripts.sh

      - name: Run tests
        run: tests/run-tests.sh
